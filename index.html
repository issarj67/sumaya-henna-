<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sumaya Henna</title>

<style>
body{font-family:Arial,sans-serif;background:#faf4ee;color:#6b4e4e;margin:0}
header{padding:50px;text-align:center;background:#f5e9df}
img{width:180px;border-radius:50%}
section{max-width:900px;margin:auto;padding:30px}
a.btn{background:#8b5c70;color:#fff;padding:12px 20px;text-decoration:none;border-radius:25px}
footer{text-align:center;padding:20px;background:#8b5c70;color:#fff}
form input, form textarea {width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:5px;}
form button {background:#8b5c70;color:#fff;padding:12px 20px;border:none;border-radius:25px;cursor:pointer;}
</style>

</head>

<body>

<header>
  <img src="logo.jpg">
  <h1>Sumaya Henna</h1>
  <p>Beautiful Custom, Traditional & Bridal Henna Designs</p>
  <a class="btn" href="#contact">Book Now</a>
</header>

<section>
  <h2>Services</h2>
  <ul>
    <li>Bridal Henna</li>
    <li>Eid Henna</li>
    <li>Private Events</li>
    <li>Custom Designs</li>
  </ul>
</section>

<section id="contact">
  <h2>Book an Appointment</h2>

  <form action="https://formspree.io/f/xpqvdypj" method="POST">
    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Preferred Date</label>
    <input type="date" name="date" required>

    <label>Design Request / Notes</label>
    <textarea name="message" rows="5"></textarea>

    <button type="submit">Submit Booking Request</button>
  </form>

  <p>Instagram: <a href="https://instagram.com/hennaby.mayaa">@hennaby.mayaa</a></p>
  <p>Email: <a href="mailto:summiixeessa14@gmail.com">summiixeessa14@gmail.com</a></p>
</section>

<footer>© Sumaya Henna</footer>

</body>
</html>
