<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumaya Henna</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background-color: #fdf7f2;
  color: #5a3e3e;
  margin: 0;
}

/* HEADER */
header {
  background-color: #f8e9dd;
  border-bottom: 3px solid #d8b89c;
  padding: 20px 0;
  text-align: center;
}

header img {
  width: 160px;
  border-radius: 50%;
  border: 3px solid #d8b89c;
}

nav {
  margin-top: 15px;
}

nav a {
  color: #8b5c70;
  text-decoration: none;
  margin: 0 15px;
  font-weight: 500;
}

nav a:hover {
  color: #d8b89c;
}

/* HERO SECTION */
.hero {
  background: url('banner.jpg') center/cover no-repeat;
  text-align: center;
  padding: 120px 20px;
  color: #5a3e3e;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3em;
  margin-bottom: 10px;
}

.hero p {
  font-size: 1.2em;
  margin-bottom: 30px;
}

.hero .btn {
  background-color: #8b5c70;
  color: #fff;
  padding: 12px 25px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* SERVICES SECTION */
<section id="menu" style="
  max-width: 650px;
  margin: 60px auto;
  background: #fdf7f2;
  padding: 35px;
  border-radius: 18px;
  border: 2px solid #d8b89c;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
 text-align: left;
padding-left: 80px;
margin-top: 20px;

">

  <h2 style="
    font-family: 'Playfair Display', serif;
    color: #8b5c70;
    font-size: 1.8em;
    margin: 15px 0 25px;

  ">
    Henna Menu
  </h2>

  <div style="
    height: 3px;
    width: 100px;
    background: #d8b89c;
    margin: 15px auto 25px;
    border-radius: 2px;
  "></div>

  <p style="
    font-size: 1.1em;
    color: #5a3e3e;
    margin-bottom: 25px;
    font-weight: 500;
    letter-spacing: 1px;
  ">
    Khaleeji • Floral • Islamic Style
  </p>

  <div style="
    text-align: left;
    font-size: 1.15em;
    line-height: 1.9;
    color: #5a3e3e;
  ">
    <strong style="color:#8b5c70;">Bridal Henna</strong><br>
    Elegant full bridal designs with Khaleeji + floral patterns.

    <br><br>

    <strong style="color:#8b5c70;">Eid & Ramadan Henna</strong><br>
    Beautiful festive designs for Eid nights and Ramadan gatherings.

    <br><br>

    <strong style="color:#8b5c70;">Private Events & Parties</strong><br>
    Henna for birthdays, bridal showers, baby showers, and group events.

    <br><br>

    <strong style="color:#8b5c70;">Custom Designs</strong><br>
    Personalized henna art inspired by your style and ideas.
  </div>

</section>



/* GALLERY GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  border: 3px solid #d8b89c;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
}

/* BOOKING FORM */
form {
  max-width: 600px;
  margin: 40px auto;
  background: #fff8f3;
  padding: 30px;
  border-radius: 10px;
  border: 2px solid #d8b89c;
}

form label {
  display: block;
  margin-top: 10px;
  font-weight: 500;
}

form input, form textarea {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: 1px solid #d8b89c;
  border-radius: 8px;
  background: #fff;
}

form button {
  background: #8b5c70;
  color: #fff;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 1em;
  margin-top: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* FOOTER */
footer {
  background-color: #8b5c70;
  color: #fff;
  text-align: center;
  padding: 20px;
  font-size: 0.9em;
}
</style>
</head>

<body>

<header>
  <img src="logo.jpg" alt="Sumaya Henna Logo">
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Booking</a>
  </nav>
</header>

<div class="hero" id="home">
  <h1>Sumaya Henna</h1>
  <p>Elegant • Traditional • Bridal • Custom Henna Art</p>
  <a href="#contact" class="btn">Book Now</a>
</div>

<section id="services">
  <h2>Our Services</h2>
  <div class="decor"></div>
  <ul style="list-style:none; padding:0; text-align:center;">
    <li>Bridal Henna</li>
    <li>Eid & Ramadan Henna</li>
    <li>Private Events & Parties</li>
    <li>Custom Designs</li>
  </ul>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <div class="decor"></div>

  <div class="gallery">
    <a href="weding.jpeg" target="_blank">
      <img src="weding.jpeg" alt="Wedding Henna">
    </a>

    <a href="henna2.jpeg" target="_blank">
      <img src="henna2.jpeg" alt="Henna Design 2">
    </a>

    <a href="henna.jpeg" target="_blank">
      <img src="henna.jpeg" alt="Henna Design 3">
    </a>

    <a href="henna4.jpeg" target="_blank">
      <img src="henna4.jpeg" alt="Henna Design 4">
    </a>
  </div>
</section>

<section id="contact">
  <h2>Book an Appointment</h2>
  <div class="decor"></div>

  <form action="https://formspree.io/f/xqerqggg" method="POST">
    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Preferred Date</label>
    <input type="date" name="date" required>

    <label>Design Request / Notes</label>
    <textarea name="message" rows="5"></textarea>

    <button type="submit">Submit Booking Request</button>
  </form>
</section>

<footer>© 2026 Sumaya Henna — Crafted with Love</footer>

</body>
</html>
